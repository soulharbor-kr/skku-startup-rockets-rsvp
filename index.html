<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스타트업 동문 모임 — RSVP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0d0d0d;
    --white: #fafaf8;
    --gold: #c8a96e;
    --gold-light: #e8d5a8;
    --gray: #6b6b6b;
    --gray-light: #d4d4cc;
    --surface: #1a1a18;
    --surface2: #222220;
    --confirmed: #3d6b3d;
    --confirmed-bg: #1e2e1e;
    --waiting: #7a5c1e;
    --waiting-bg: #2a2310;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* --- HERO --- */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 4rem 2rem;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(200,169,110,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-line {
    position: absolute;
    top: 0; left: 50%;
    width: 0.5px;
    height: 120px;
    background: linear-gradient(to bottom, transparent, var(--gold));
    transform: translateX(-50%);
    animation: lineDown 1.2s ease forwards;
    transform-origin: top;
  }

  @keyframes lineDown {
    from { height: 0; opacity: 0; }
    to { height: 120px; opacity: 1; }
  }

  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 2rem;
    animation: fadeUp 0.8s 0.4s ease both;
  }

  .hero-title {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(2.8rem, 7vw, 5.5rem);
    font-weight: 300;
    line-height: 1.15;
    letter-spacing: -0.02em;
    color: var(--white);
    margin-bottom: 1.5rem;
    animation: fadeUp 0.8s 0.6s ease both;
  }

  .hero-title em {
    font-style: normal;
    color: var(--gold);
  }

  .hero-meta {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    font-size: 15px;
    color: var(--gray);
    letter-spacing: 0.05em;
    margin-bottom: 3rem;
    animation: fadeUp 0.8s 0.8s ease both;
  }

  .hero-meta strong {
    color: var(--white);
    font-weight: 400;
  }

  .hero-cta {
    display: inline-block;
    padding: 14px 40px;
    border: 0.5px solid var(--gold);
    color: var(--gold);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    text-decoration: none;
    transition: all 0.3s ease;
    animation: fadeUp 0.8s 1s ease both;
    cursor: pointer;
    background: transparent;
  }

  .hero-cta:hover {
    background: var(--gold);
    color: var(--black);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* --- DIVIDER --- */
  .divider {
    width: 100%;
    max-width: 800px;
    margin: 0 auto;
    height: 0.5px;
    background: linear-gradient(to right, transparent, var(--gold-light), transparent);
    opacity: 0.3;
  }

  /* --- SECTION --- */
  .section {
    max-width: 1100px;
    margin: 0 auto;
    padding: 5rem 2rem;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .section-title {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(1.6rem, 3vw, 2.4rem);
    font-weight: 300;
    color: var(--white);
    margin-bottom: 3rem;
  }

  /* --- ATTENDEE GRID --- */
  .attendee-tabs {
    display: flex;
    gap: 0;
    border-bottom: 0.5px solid #333;
    margin-bottom: 2.5rem;
  }

  .tab-btn {
    padding: 10px 24px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--gray);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: -0.5px;
  }

  .tab-btn.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .attendee-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  .attendee-card {
    background: var(--surface);
    border: 0.5px solid #2a2a28;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.2s;
  }

  .attendee-card:hover { border-color: #444; }

  .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500;
    flex-shrink: 0;
  }

  .avatar-blue { background: #0d2240; color: #6ab4f5; }
  .avatar-gold { background: #2a2008; color: #c8a96e; }

  .attendee-name { font-size: 14px; font-weight: 400; color: var(--white); }
  .attendee-role { font-size: 11.5px; color: var(--gray); margin-top: 2px; line-height: 1.4; }

  .sector-tag {
    display: inline-block;
    margin-top: 6px;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 2px;
    letter-spacing: 0.05em;
  }
  .st-startup { background: #1c1030; color: #9b7de0; }
  .st-univ { background: #0d2a1a; color: #5dc49b; }
  .st-finance { background: #0a1c30; color: #5baee0; }
  .st-public { background: #1c1c18; color: #aaa898; }
  .st-media { background: #2a1510; color: #e08060; }
  .st-invest { background: #2a1022; color: #d080b0; }

  /* count badge */
  .count-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    border: 0.5px solid #333;
    border-radius: 20px;
    font-size: 11px;
    color: var(--gray);
    padding: 2px 10px;
    margin-left: 8px;
    vertical-align: middle;
  }

  /* --- RSVP FORM --- */
  .form-section {
    max-width: 680px;
    margin: 0 auto;
    padding: 5rem 2rem;
  }

  .form-card {
    background: var(--surface);
    border: 0.5px solid #2a2a28;
    padding: 3rem;
  }

  .form-header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .form-header .section-label { text-align: center; }

  .form-header h2 {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.8rem;
    font-weight: 300;
    color: var(--white);
    margin-top: 0.5rem;
  }

  .form-group {
    margin-bottom: 1.5rem;
  }

  .form-label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: #111110;
    border: 0.5px solid #333;
    color: var(--white);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 300;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    border-radius: 0;
  }

  .form-input::placeholder, .form-textarea::placeholder { color: #555; }

  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--gold);
  }

  .form-select { cursor: pointer; }

  .form-textarea { resize: vertical; min-height: 80px; }

  .radio-group {
    display: flex;
    gap: 12px;
  }

  .radio-label {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    background: #111110;
    border: 0.5px solid #333;
    padding: 12px 16px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 14px;
    color: var(--gray);
  }

  .radio-label:has(input:checked) {
    border-color: var(--gold);
    color: var(--gold);
    background: #1e1a0f;
  }

  .radio-label input { display: none; }

  .radio-indicator {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 1px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .radio-label:has(input:checked) .radio-indicator::after {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
  }

  .submit-btn {
    width: 100%;
    padding: 16px;
    background: transparent;
    border: 0.5px solid var(--gold);
    color: var(--gold);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 1rem;
  }

  .submit-btn:hover {
    background: var(--gold);
    color: var(--black);
  }

  .submit-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* success state */
  .success-message {
    display: none;
    text-align: center;
    padding: 3rem 2rem;
  }

  .success-icon {
    width: 60px; height: 60px;
    border: 0.5px solid var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.5rem;
    font-size: 24px;
    color: var(--gold);
  }

  .success-message h3 {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.5rem;
    font-weight: 300;
    color: var(--white);
    margin-bottom: 0.75rem;
  }

  .success-message p {
    font-size: 14px;
    color: var(--gray);
    line-height: 1.8;
  }

  /* --- FOOTER --- */
  footer {
    text-align: center;
    padding: 3rem 2rem;
    border-top: 0.5px solid #1e1e1c;
    font-size: 12px;
    color: #444;
    letter-spacing: 0.1em;
  }

  /* --- STATS BAR --- */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 0;
    border: 0.5px solid #2a2a28;
    max-width: 500px;
    margin: 0 auto 4rem;
  }

  .stat-item {
    flex: 1;
    text-align: center;
    padding: 1.5rem 1rem;
    border-right: 0.5px solid #2a2a28;
  }

  .stat-item:last-child { border-right: none; }

  .stat-num {
    font-family: 'Noto Serif KR', serif;
    font-size: 2rem;
    font-weight: 300;
    color: var(--gold);
  }

  .stat-label {
    font-size: 11px;
    color: var(--gray);
    letter-spacing: 0.15em;
    margin-top: 4px;
  }

  /* mobile */
  @media (max-width: 600px) {
    .form-card { padding: 2rem 1.5rem; }
    .radio-group { flex-direction: column; }
    .hero-title { font-size: 2.4rem; }
  }
</style>
</head>
<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-line"></div>
  <div class="hero-eyebrow">Startup Alumni Gathering · 2025</div>
  <h1 class="hero-title">스타트업<br><em>동문 모임</em></h1>
  <div class="hero-meta">
    <div><strong>2025년 6월 2일 (월)</strong></div>
    <div>오후 7:00 — 10:00</div>
    <div>삼성동 스파크플러스</div>
  </div>
  <button class="hero-cta" onclick="document.getElementById('rsvp').scrollIntoView({behavior:'smooth'})">
    참석 여부 확인하기
  </button>
</section>

<div class="divider"></div>

<!-- ATTENDEES -->
<section class="section">
  <div class="section-label">Attendees</div>
  <div class="section-title">참석 예정 멤버</div>

  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-num">13</div>
      <div class="stat-label">참석 확정</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">12</div>
      <div class="stat-label">참석 대기</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">25</div>
      <div class="stat-label">총 예상 인원</div>
    </div>
  </div>

  <div class="attendee-tabs">
    <button class="tab-btn active" onclick="switchTab('confirmed', this)">참석 확정 <span class="count-badge">13</span></button>
    <button class="tab-btn" onclick="switchTab('waiting', this)">참석 대기 <span class="count-badge">12</span></button>
  </div>

  <div id="tab-confirmed" class="tab-panel active">
    <div class="attendee-grid" id="confirmed-grid"></div>
  </div>

  <div id="tab-waiting" class="tab-panel">
    <div class="attendee-grid" id="waiting-grid"></div>
  </div>
</section>

<div class="divider"></div>

<!-- RSVP FORM -->
<div class="form-section" id="rsvp">
  <div class="form-card">
    <div class="form-header">
      <div class="section-label">RSVP</div>
      <h2>참석 여부를 알려주세요</h2>
    </div>

    <form id="rsvp-form">
      <div class="form-group">
        <label class="form-label">이름 *</label>
        <input type="text" class="form-input" id="name" placeholder="홍길동" required>
      </div>

      <div class="form-group">
        <label class="form-label">소속 / 직책 *</label>
        <input type="text" class="form-input" id="affiliation" placeholder="회사명 / 직책" required>
      </div>

      <div class="form-group">
        <label class="form-label">연락처 (전화번호 또는 이메일) *</label>
        <input type="text" class="form-input" id="contact" placeholder="010-0000-0000 또는 email@example.com" required>
      </div>

      <div class="form-group">
        <label class="form-label">참석 여부 *</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="attendance" value="yes" required>
            <span class="radio-indicator"></span>
            참석합니다
          </label>
          <label class="radio-label">
            <input type="radio" name="attendance" value="no">
            <span class="radio-indicator"></span>
            불참합니다
          </label>
        </div>
      </div>

      <div class="form-group" id="diet-group">
        <label class="form-label">식사 관련 특이사항</label>
        <input type="text" class="form-input" id="diet" placeholder="채식, 알레르기 등 (없으면 비워두세요)">
      </div>

      <div class="form-group">
        <label class="form-label">메시지 (선택)</label>
        <textarea class="form-textarea" id="message" placeholder="간단한 인사나 전달사항을 남겨주세요"></textarea>
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">
        참석 의사 전달하기
      </button>
    </form>

    <div class="success-message" id="success-msg">
      <div class="success-icon">✓</div>
      <h3 id="success-title">참석 확인이 완료되었습니다</h3>
      <p id="success-body">소중한 시간을 내어 주셔서 감사합니다.<br>6월 2일 스파크플러스에서 뵙겠습니다.</p>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  문의 · 홍성완 (성균관대 창업지원단) &nbsp;|&nbsp; 2025 스타트업 동문 모임
</footer>

<script>
const confirmed = [
  { name:"홍성완", role:"성균관대 창업지원단 수석", sector:"univ", tag:"대학" },
  { name:"승영욱", role:"포스페이스랩 대표", sector:"startup", tag:"스타트업" },
  { name:"민무홍", role:"성균관대 컴퓨터교육학과 교수", sector:"univ", tag:"대학" },
  { name:"홍성후", role:"국립암센터 대외협력팀장", sector:"public", tag:"공공" },
  { name:"천영록", role:"모트에이아이 대표", sector:"startup", tag:"스타트업" },
  { name:"노건준", role:"성균관대 인공지능학과 학생", sector:"univ", tag:"대학" },
  { name:"이현웅", role:"YTN 앵커", sector:"media", tag:"미디어" },
  { name:"박동찬", role:"파일러 CTO", sector:"startup", tag:"스타트업" },
  { name:"김영현", role:"국정원 전무", sector:"public", tag:"공공" },
  { name:"함창욱", role:"신용보증기금 팀장", sector:"finance", tag:"금융" },
  { name:"박재훈", role:"국민은행 팀장", sector:"finance", tag:"금융" },
  { name:"김정년", role:"CYP 본부장", sector:"startup", tag:"스타트업" },
  { name:"문예슬", role:"피클스 대표 / 성형외과 원장", sector:"startup", tag:"스타트업" },
];

const waiting = [
  { name:"홍민우", role:"카카오뱅크 팀장", sector:"finance", tag:"금융" },
  { name:"김진성", role:"대륙아주법인 연구원", sector:"public", tag:"전문직" },
  { name:"송락현", role:"한국물류데이터 대표", sector:"startup", tag:"스타트업" },
  { name:"이강훈", role:"도우물류 대표", sector:"startup", tag:"스타트업" },
  { name:"이흥규", role:"라이폴리 대표", sector:"startup", tag:"스타트업" },
  { name:"박준호", role:"비엑스컨설팅 대표", sector:"startup", tag:"스타트업" },
  { name:"조유진", role:"스마일게이트 팀장", sector:"startup", tag:"스타트업" },
  { name:"문희", role:"한국투액셀러레이터 팀장", sector:"invest", tag:"투자" },
  { name:"승주완", role:"성균관대 책임", sector:"univ", tag:"대학" },
  { name:"김준석", role:"더파운더스(아누아) 본부장", sector:"startup", tag:"스타트업" },
  { name:"김세연", role:"블루버스인베스트먼트 대표", sector:"invest", tag:"투자" },
  { name:"이희종", role:"메디치인베스트먼트 이사", sector:"invest", tag:"투자" },
];

function initials(name) { return name.slice(0,2); }

function renderCards(list, gridId, avatarClass) {
  const grid = document.getElementById(gridId);
  grid.innerHTML = list.map(p => `
    <div class="attendee-card">
      <div class="avatar ${avatarClass}">${initials(p.name)}</div>
      <div>
        <div class="attendee-name">${p.name}</div>
        <div class="attendee-role">${p.role}</div>
        <span class="sector-tag st-${p.sector}">${p.tag}</span>
      </div>
    </div>
  `).join('');
}

renderCards(confirmed, 'confirmed-grid', 'avatar-blue');
renderCards(waiting, 'waiting-grid', 'avatar-gold');

function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
}

document.getElementById('rsvp-form').addEventListener('submit', function(e) {
  e.preventDefault();
  const name = document.getElementById('name').value.trim();
  const attendance = document.querySelector('input[name="attendance"]:checked')?.value;
  const btn = document.getElementById('submit-btn');

  if (!name || !attendance) return;

  btn.disabled = true;
  btn.textContent = '전송 중...';

  // 여기에 실제 API 연동 (Supabase / Google Sheets 등) 추가
  // 현재는 2초 후 성공 처리 시뮬레이션
  setTimeout(() => {
    const isYes = attendance === 'yes';
    document.getElementById('rsvp-form').style.display = 'none';
    const msg = document.getElementById('success-msg');
    msg.style.display = 'block';
    document.getElementById('success-title').textContent = isYes
      ? `${name}님, 참석 확인이 완료되었습니다!`
      : `${name}님, 응답해 주셔서 감사합니다`;
    document.getElementById('success-body').textContent = isYes
      ? '소중한 시간을 내어 주셔서 감사합니다.\n6월 2일 월요일 오후 7시, 삼성동 스파크플러스에서 뵙겠습니다.'
      : '아쉽지만 다음 모임에서 함께하길 기대합니다.\n언제든지 연락 주세요!';
  }, 1500);
});
</script>
</body>
</html>
